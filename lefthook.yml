pre-commit:
  commands:
    lint:
      glob: "**/*.{js,jsx,ts,tsx,mjs,cjs}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
    format:
      glob: "**/*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc,css,md}"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    check:
      run: pnpm check
    test:
      run: pnpm test
